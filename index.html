<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>핸디 선풍기 (백색소음)</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#aaccbb">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="핸디 선풍기">
<style>
  body{margin:0;background:#ffffff;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:sans-serif;-webkit-user-select:none;user-select:none}
  .app{text-align:center}
  #stage{position:relative;display:inline-block}

  .fan-blades{
    position:absolute;z-index:1;
    background-image:url('blades.png');background-size:100% 100%;background-repeat:no-repeat;
    will-change:transform;
  }
  .fan-body{display:block;width:240px;position:relative;z-index:2}

  .led{
    position:absolute;z-index:3;border-radius:50%;background:#cfd6d2;
    transition:background .15s ease, box-shadow .15s ease;pointer-events:none;
  }
  .led.on{background:#37e23a;box-shadow:0 0 6px 1px rgba(55,226,58,0.85)}

  .ctrl{margin-top:20px}
  .ctrl button{
    width:56px;height:48px;margin:0 5px;border-radius:12px;
    border:1px solid #aaccbb;background:#fff;cursor:pointer;font-size:16px;font-weight:600;color:#557766;
    transition:background .15s ease, color .15s ease, transform .05s ease;
  }
  .ctrl button:active{transform:scale(0.94)}
  .ctrl button.active{background:#aaccbb;color:#fff}
  #label{margin-top:12px;color:#557766;font-size:14px}

  .timer{margin-top:22px;display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap}
  .timer .tt{color:#88a89a;font-size:13px;margin-right:2px}
  .timer button{
    height:36px;padding:0 12px;border-radius:18px;
    border:1px solid #cfe0d8;background:#fff;cursor:pointer;font-size:13px;color:#557766;
    transition:background .15s ease, color .15s ease, transform .05s ease;
  }
  .timer button:active{transform:scale(0.94)}
  .timer button.active{background:#aaccbb;color:#fff;border-color:#aaccbb}
  #tdisplay{margin-top:10px;color:#7a9d8c;font-size:13px;min-height:18px}
</style>
</head>
<body>
<div class="app">
  <div id="stage">
    <div id="blades" class="fan-blades"></div>
    <img id="body" class="fan-body" src="body.png" alt="선풍기">
    <div class="led" id="led0"></div>
    <div class="led" id="led1"></div>
    <div class="led" id="led2"></div>
  </div>

  <div class="ctrl">
    <button id="b0" onclick="setLevel(0)">OFF</button>
    <button id="b1" onclick="setLevel(1)">1</button>
    <button id="b2" onclick="setLevel(2)">2</button>
    <button id="b3" onclick="setLevel(3)">3</button>
  </div>
  <div id="label">꺼짐</div>

  <div class="timer">
    <span class="tt">타이머</span>
    <button data-min="10" onclick="setTimer(10,this)">10분</button>
    <button data-min="30" onclick="setTimer(30,this)">30분</button>
    <button data-min="60" onclick="setTimer(60,this)">1시간</button>
    <button id="tcancel" onclick="clearTimer()">해제</button>
  </div>
  <div id="tdisplay"></div>
</div>

<script>
/* ---------- 레이아웃 (날개/LED 위치) ---------- */
const GCX = 0.5008, GCY = 0.2627, BLADE_W = 0.86;
const LED_POS = [[0.4575,0.6236],[0.4997,0.6237],[0.5419,0.6236]];
const leds = [led0, led1, led2];
const body = document.getElementById('body');
const blades = document.getElementById('blades');

function layout(){
  const w = body.clientWidth, h = w * (body.naturalHeight / body.naturalWidth);
  const side = BLADE_W * w;
  blades.style.width = side+'px'; blades.style.height = side+'px';
  blades.style.left = (GCX*w - side/2)+'px'; blades.style.top = (GCY*h - side/2)+'px';
  const d = 0.03 * w;
  LED_POS.forEach((p,i)=>{
    leds[i].style.width=d+'px'; leds[i].style.height=d+'px';
    leds[i].style.left=(p[0]*w-d/2)+'px'; leds[i].style.top=(p[1]*h-d/2)+'px';
  });
}
if(body.complete && body.naturalWidth) layout();
body.onload = layout;
window.addEventListener('resize', layout);

/* ---------- 날개 회전 (부드러운 가속/감속) ---------- */
const SPIN_SPEED = [0, 300, 620, 1100];  // 단계별 목표 속도(°/초)
let angle = 0, curSpeed = 0, targetSpeed = 0, lastT = 0, rafId = null;

function animate(t){
  if(!lastT) lastT = t;
  const dt = Math.min(0.05, (t - lastT) / 1000);
  lastT = t;
  // 가속은 빠르게, 감속(끌 때)은 천천히 → 자연스럽게 멈춤
  const tau = targetSpeed >= curSpeed ? 0.45 : 1.6;
  curSpeed += (targetSpeed - curSpeed) * (1 - Math.exp(-dt / tau));
  angle = (angle + curSpeed * dt) % 360;
  blades.style.transform = 'rotate(' + angle + 'deg)';
  if(curSpeed > 0.3 || targetSpeed > 0){
    rafId = requestAnimationFrame(animate);
  } else {
    curSpeed = 0; rafId = null; lastT = 0;
  }
}
function setSpin(lv){
  targetSpeed = SPIN_SPEED[lv];
  if(!rafId){ lastT = 0; rafId = requestAnimationFrame(animate); }
}

/* ---------- 백색소음 (신생아용: 포근한 핑크노이즈) ---------- */
let actx, noiseGain, lowpass;
function ensureAudio(){
  if(actx) return;
  actx = new (window.AudioContext||window.webkitAudioContext)();
  const len = actx.sampleRate*3;
  const buf = actx.createBuffer(1, len, actx.sampleRate);
  const d = buf.getChannelData(0);
  // 핑크노이즈 (Paul Kellet) — 저역 중심의 부드러운 노이즈 = 자궁 속/헤어드라이어 느낌
  let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
  for(let i=0;i<len;i++){
    const w = Math.random()*2 - 1;
    b0=0.99886*b0+w*0.0555179; b1=0.99332*b1+w*0.0750759; b2=0.96900*b2+w*0.1538520;
    b3=0.86650*b3+w*0.3104856; b4=0.55000*b4+w*0.5329522; b5=-0.7616*b5-w*0.0168980;
    d[i]=(b0+b1+b2+b3+b4+b5+b6+w*0.5362)*0.11;
    b6=w*0.115926;
  }
  const src = actx.createBufferSource();
  src.buffer = buf; src.loop = true;
  // 초저역만 살짝 정리 + 고음 깎아 포근하게
  const highpass = actx.createBiquadFilter();
  highpass.type = 'highpass'; highpass.frequency.value = 50;
  lowpass = actx.createBiquadFilter();
  lowpass.type = 'lowpass'; lowpass.frequency.value = 600;
  noiseGain = actx.createGain();
  noiseGain.gain.value = 0;
  src.connect(highpass); highpass.connect(lowpass); lowpass.connect(noiseGain); noiseGain.connect(actx.destination);
  src.start();
}

/* ---------- 단계 제어 ---------- */
const label = document.getElementById('label');
const labels = ['꺼짐','약풍 (1단)','중풍 (2단)','강풍 (3단)'];
const noiseVol = [0, 0.07, 0.12, 0.18];      // 백색소음 볼륨
const cutoff   = [400, 550, 750, 1000];      // 낮게 유지 → 포근하고 둥근 신생아용 톤
let level = 0;

function setLevel(s){
  level = s;
  for(let i=0;i<=3;i++) document.getElementById('b'+i).classList.toggle('active', i===s);
  label.textContent = labels[s];
  leds.forEach((led,i)=>led.classList.toggle('on', i<s));

  setSpin(s);  // 부드럽게 가속/감속

  ensureAudio();
  if(actx.state === 'suspended') actx.resume();
  const now = actx.currentTime;
  // 끌 때(0)는 소리도 천천히 페이드, 단계 변경은 살짝 부드럽게
  const fade = s === 0 ? 0.5 : 0.15;
  noiseGain.gain.setTargetAtTime(noiseVol[s], now, fade);
  lowpass.frequency.setTargetAtTime(cutoff[s], now, 0.15);

  if(s === 0) clearTimer();  // 끄면 타이머도 해제
}

/* ---------- 타이머 ---------- */
let timerEnd = 0, tIv = null;
const tdisplay = document.getElementById('tdisplay');
const timerBtns = document.querySelectorAll('.timer button[data-min]');

function setTimer(min, btn){
  if(tIv){ clearInterval(tIv); tIv = null; }
  timerEnd = Date.now() + min*60000;
  timerBtns.forEach(b=>b.classList.toggle('active', b===btn));
  tIv = setInterval(tick, 1000);
  tick();
}
function tick(){
  const rem = timerEnd - Date.now();
  if(rem <= 0){ clearTimer(); setLevel(0); tdisplay.textContent = '⏱ 타이머 종료 — 꺼짐'; return; }
  const m = Math.floor(rem/60000), sec = Math.floor((rem%60000)/1000);
  tdisplay.textContent = `⏱ ${m}:${String(sec).padStart(2,'0')} 후 꺼짐`;
}
function clearTimer(){
  if(tIv){ clearInterval(tIv); tIv = null; }
  timerEnd = 0;
  timerBtns.forEach(b=>b.classList.remove('active'));
  tdisplay.textContent = '';
}

/* ---------- PWA ---------- */
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
const __auto = new URLSearchParams(location.search).get('auto');
if(__auto){ setLevel(parseInt(__auto,10)); }
</script>
</body>
</html>
